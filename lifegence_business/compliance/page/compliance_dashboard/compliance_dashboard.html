<!-- jinja -->
<div class="compliance-dashboard">
	<!-- Stats Section -->
	<div class="compliance-stats mb-4"></div>

	<!-- Search Section -->
	<div class="card mb-4">
		<div class="card-body">
			<h5 class="card-title">{{ _("RAG Search - Committee Reports") }}</h5>
			<div class="row">
				<div class="col-md-4">
					<input type="text" class="form-control compliance-search-input"
						placeholder="{{ _('検索キーワード (例: 会計不正, 品質偽装)') }}">
				</div>
				<div class="col-md-2">
					<select class="form-control compliance-year-filter"></select>
				</div>
				<div class="col-md-2">
					<input type="text" class="form-control compliance-company-filter"
						placeholder="{{ _('Company name') }}">
				</div>
				<div class="col-md-2">
					<select class="form-control compliance-classification-filter">
						<option value="">{{ _("All Categories") }}</option>
					</select>
				</div>
				<div class="col-md-2">
					<button class="btn btn-primary btn-block compliance-search-btn">
						{{ _("Search") }}
					</button>
				</div>
			</div>
			<div class="row mt-2">
				<div class="col-md-12">
					<div class="btn-group compliance-search-type" role="group">
						<button class="btn btn-sm btn-outline-primary active" data-type="hybrid">
							{{ _("Hybrid") }}
						</button>
						<button class="btn btn-sm btn-outline-primary" data-type="vector">
							{{ _("Vector") }}
						</button>
						<button class="btn btn-sm btn-outline-primary" data-type="fulltext">
							{{ _("Full-text") }}
						</button>
					</div>
				</div>
			</div>
		</div>
	</div>

	<!-- Results Section -->
	<div class="compliance-results">
		<div class="text-center text-muted p-5">
			{{ _("検索キーワードを入力して委員会報告書を検索します (ベクトル検索 + 全文検索)") }}
		</div>
	</div>
</div>
